<!DOCTYPE html>
<html>
<head>
  <title>RAG Chat</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #111;
      color: white;
      padding: 20px;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #4caf50;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #ddd;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-left: 10px;
      cursor: pointer;
    }

    .upload {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>📄 Upload File</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <p id="status"></p>
  </div>

  <div class="chat">

    <div class="messages" id="chatBox"></div>

    <div class="input-box">
      <input id="question" placeholder="Ask something...">
      <button onclick="ask()">Send</button>
    </div>

  </div>

</div>

<script>
const API = "http://127.0.0.1:8000";

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chatBox").appendChild(div);
}

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  const res = await fetch(`${API}/upload`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("status").innerText = data.message;
}

async function ask() {
  const q = document.getElementById("question").value;

  addMessage(q, "user");

  const res = await fetch(`${API}/ask?question=${encodeURIComponent(q)}`, {
    method: "POST"
  });

  const data = await res.json();

  addMessage(data.answer, "bot");

  document.getElementById("question").value = "";
}
</script>

</body>
</html>
